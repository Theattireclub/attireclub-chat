<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Attire Club Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;h
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      height: 92vh;
      max-height: 740px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.2px;
    }

    .header-text p {
      font-size: 12px;
      color: #22c55e;
      font-weight: 500;
      margin-top: 2px;
    }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .message.bot .bubble {
      background: #f4f4f4;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: #111;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .timestamp {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
      padding: 0 4px;
    }

    .message.user .timestamp { text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: #f4f4f4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      gap: 5px;
      flex-direction: row;
      align-items: center;
    }

    .typing-indicator.visible { display: flex; }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Quick replies */
    .quick-replies {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-reply-btn {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      color: #333;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .quick-reply-btn:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* Input area */
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
    }

    .chat-input {
      flex: 1;
      border: 1px solid #e8e8e8;
      border-radius: 24px;
      padding: 11px 18px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      color: #111;
      background: #fafafa;
      transition: border-color 0.15s;
    }

    .chat-input:focus {
      border-color: #bbb;
      background: #fff;
    }

    .chat-input::placeholder { color: #bbb; }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #111;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: #333; }
    .send-btn:active { transform: scale(0.95); }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .send-btn:disabled { background: #ddd; cursor: not-allowed; }

    /* Powered by */
    .powered-by {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: #ddd;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>The Attire Club</h1>
      <p>● Online now</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      <div class="bubble">Hi! Welcome to The Attire Club 👋<br><br>I can help you with orders, tracking, product questions, or anything else. How can I help you today?</div>
      <span class="timestamp">Just now</span>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Quick replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-reply-btn" onclick="sendQuickReply('Track my order')">Track my order</button>
    <button class="quick-reply-btn" onclick="sendQuickReply('Browse products')">Browse products</button>
    <button class="quick-reply-btn" onclick="sendQuickReply('I have an issue')">I have an issue</button>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea
      class="chat-input"
      id="chatInput"
      placeholder="Type a message..."
      rows="1"
      onkeydown="handleKeyDown(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="powered-by">Powered by AI</div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  // Replace this with your n8n webhook URL once you set it up
  const N8N_WEBHOOK_URL = '/api/chat';
  // ────────────────────────────────────────────────────────

  const messagesEl = document.getElementById('chatMessages');
  const inputEl = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const typingEl = document.getElementById('typingIndicator');
  const quickRepliesEl = document.getElementById('quickReplies');

  // Simple session ID so n8n can track conversation context
  const sessionId = 'session_' + Math.random().toString(36).substr(2, 9);

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(text, sender) {
    // Remove typing indicator before appending
    typingEl.classList.remove('visible');

    const msg = document.createElement('div');
    msg.classList.add('message', sender);

    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    bubble.innerHTML = text.replace(/\n/g, '<br>');

    const ts = document.createElement('span');
    ts.classList.add('timestamp');
    ts.textContent = getTime();

    msg.appendChild(bubble);
    msg.appendChild(ts);

    // Insert before typing indicator
    messagesEl.insertBefore(msg, typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    typingEl.classList.add('visible');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideQuickReplies() {
    quickRepliesEl.style.display = 'none';
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    hideQuickReplies();
    appendMessage(text, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          sessionId: sessionId,
          timestamp: new Date().toISOString()
        })
      });

      const data = await response.json();
      const reply = data.reply || data.message || data.output || 'Sorry, I didn\'t get a response. Please try again.';
      appendMessage(reply, 'bot');

    } catch (err) {
      appendMessage('Sorry, something went wrong. Please try again in a moment.', 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendQuickReply(text) {
    inputEl.value = text;
    sendMessage();
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>

</body>
</html>
